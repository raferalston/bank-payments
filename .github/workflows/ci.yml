# CI для FastAPI-проекта: линт, проверки, тесты
# Запускается на push и pull_request в main/master

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: it-guru
          POSTGRES_USER: it-guru
          POSTGRES_PASSWORD: it-guru
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U it-guru -d it-guru"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: "postgres://it-guru:it-guru@localhost:5432/it-guru"
      TEST_DATABASE_URL: "postgres://it-guru:it-guru@localhost:5432/it-guru_test"
      DEBUG: "False"
      BANK_API_URL: "http://localhost:8001"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Ruff check
        run: uv run ruff check src/ bank_mock/

      - name: Ruff format check
        run: uv run ruff format --check src/ bank_mock/

      - name: Run migrations
        run: uv run aerich upgrade

      - name: Create test database
        run: |
          uv run python -c "
          import asyncio
          import asyncpg
          async def main():
              conn = await asyncpg.connect('postgres://it-guru:it-guru@localhost:5432/postgres')
              exists = await conn.fetchval(\"SELECT 1 FROM pg_database WHERE datname = 'it-guru_test'\")
              if not exists:
                  await conn.execute('CREATE DATABASE \"it-guru_test\"')
              await conn.close()
          asyncio.run(main())
          "

      - name: Run tests
        run: uv run pytest
